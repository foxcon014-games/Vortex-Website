<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithm Bot</title>
<style>
body{
    font-family: Arial, sans-serif;
    background-color: black;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    height: 100vh;
    width: 100vw;
    margin: 0;
    padding: 0;
    visibility: hidden;
}

header {
    width: 100%;
    background: black;
    padding: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    box-sizing: border-box;
    flex-shrink: 0;
}

.title {
    font-size: 23px;
    color: red;
    font-weight: bold;
	font-family:cursive;
}

#menu-btn, #send-btn {
    padding: 6px 14px;
    font-size: 15px;
    border: 0;
    border-radius: 6px;
    background: #444;
    color: red;
    cursor: pointer;
    margin-left: 2px;
}

/* Full-screen launcher-style menu overlay */
#menu-overlay, #chem-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 9999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
#menu-overlay.show, #chem-overlay.show { display: flex; }

#menu-overlay-title, #chem-overlay-title {
    color: red;
    font-size: 3.8rem;
    font-weight: bold;
    margin-bottom: 1rem;
    text-align: center;
	font-family:cursive;
      text-shadow: 0 0 7px currentColor, 0 0 20px currentColor, 0 0 40px currentColor;
}

.launcher-btn {
    padding: 1rem 3rem;
    font-size: 1.4rem;
    margin: 1rem;
    min-width: 360px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #333;
    color: red;
    font-weight: bold;
    text-shadow: 0 0 7px currentColor, 0 0 20px currentColor, 0 0 40px currentColor;
   
}


/* Keep menu-panel hidden — no longer used */
#menu-panel { display: none !important; }

.menu-btn {
    padding: 6px 14px;
    background: #444;
    color: red;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
  
}



#chat-container {
    width: 100%;
    flex: 1;
    overflow: hidden;
    background-color: #1e1e1e;
    border-top: 1px solid maroon;
    display: none;
    flex-direction: column;
    padding: 10px;
    box-sizing: border-box;
}

#chat-box {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    word-wrap: break-word;
    word-break: break-word;
    margin-bottom: 8px;
    padding: 0 8px;
    font-size: 15.5px;
    line-height: 1.32;
    scroll-behavior: smooth;
}

#input-container {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
}

#user-input {
    flex: 1;
    min-width: 50px;
    padding: 6px 12px;
    font-size: 15px;
    border-radius: 6px;
    border: 1px solid maroon;
    background: black;
    color: red;
    outline: none;
    margin-right: 2px;
}

.message {
    padding: 10px 12px;
    margin: 6px 0;
    border-radius: 8px;
    max-width: 95%;
    word-break: break-word;
    font-size: 17px;
}

.user {
    background-color: black;
    color: red;
    align-self: flex-end;
    border: 1px solid #440000;
}

.bot {
    background-color: black;
    color: white;
    align-self: flex-start;
    border: 1px solid #333;
}




/* ===================== ELEMENT CONSTRUCTOR ===================== */
#element-page {
    display: none;
    width: 100%;
    flex: 1;
    overflow: hidden;
    background-color: #1e1e1e;
    border-top: 1px solid maroon;
    flex-direction: column;
    box-sizing: border-box;
    padding: 10px;
}

/* Main body row: viewer left + optional periodic right */
#ec-body {
    flex: 1;
    display: flex;
    flex-direction: row;
    gap: 20px;
    min-height: 0;
    align-items: stretch;
}

/* Viewer wrapper — left side, always visible */
#ec-viewer-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    min-width: 0;
    min-height: 0;
}

#ec-viewer {
    width: 100%;
    height: 100%;
    border: 1px solid maroon;
    border-radius: 8px;
    background: black;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    position: relative;
}

/* "Periodic Table" button — top-right of viewer, black bg */
#pt-toggle-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    padding: 4px 10px;
    font-size: 12px;
    border: 0;
    border-radius: 6px;
    background: #000;
    color: red;
    cursor: pointer;
    z-index: 10;
   
}

#pt-toggle-btn.hidden { display: none; }

/* "Compound Creator" button — top-right of viewer, left of PT button */
#cc-toggle-btn {
    position: absolute;
    top: 8px;
    right: 110px;
    padding: 4px 10px;
    font-size: 12px;
    border: 0;
    border-radius: 6px;
    background: #000;
    color: red;
    cursor: pointer;
    z-index: 10;
   
}


#cc-pt-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    padding: 4px 10px;
    font-size: 12px;
    border: 0;
    border-radius: 6px;
    background: #000;
    color: red;
    cursor: pointer;
    z-index: 11;
   
    white-space: nowrap;
}



/* CC Enter + Exit buttons — identical to #send-btn / #menu-btn */
#cc-enter-btn, #cc-menu-btn {
    padding: 6px 14px;
    font-size: 15px;
    border: 0;
    border-radius: 6px;
    background: #444;
    color: red;
    cursor: pointer;
    margin-left: 2px;
    
}


/* Periodic table panel — right side, same border/bg as viewer */
#ec-periodic {
    display: none;
    flex-direction: column;
    flex: 1.4;
    min-width: 0;
    background: black;
    border: 1px solid maroon;
    border-radius: 8px;
    overflow-y: auto;
    overflow-x: auto;
    padding: 8px;
    box-sizing: border-box;
}
#ec-periodic.show { display: flex; }

/* "Close Table" button — top-right of the periodic panel, black bg, moved up to not cover cells */
#pt-close-btn {
    position: sticky;
    top: 0;
    align-self: flex-end;
    padding: 4px 12px;
    font-size: 13px;
    font-weight: bold;
    border: 0;
    border-radius: 6px;
    background: #000;
    color: red;
    cursor: pointer;
    z-index: 20;
   
    white-space: nowrap;
    flex-shrink: 0;
    margin-bottom: 4px;
}


#ec-periodic h3 {
    color: red;
    font-size: 13px;
    margin: 0 0 6px 0;
    text-align: center;
    flex-shrink: 0;
    padding-right: 100px; /* space for close button */
}

#periodic-table-grid {
    display: grid;
    grid-template-columns: repeat(18, 1fr);
    gap: 2px;
    padding: 4px;
    padding-top: 18px;
    flex: 1;
    overflow: visible;
}

.pt-cell {
    aspect-ratio: 1;
    min-width: 0;
    background: #222;
    border: 1px solid #444;
    border-radius: 3px;
    font-size: clamp(9px, 1.3vw, 14px);
    color: red;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    cursor: pointer;
    transition: all 0.3s ease;
    box-sizing: border-box;
    overflow: visible;
    font-weight: bold;
    padding: 2px 1px 1px 1px;
    position: relative;
}

.pt-cell:hover {
    background: #444;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.12) inset, 0 0 8px rgba(255,0,0,0.4);
}

.pt-cell.highlighted {
    background: maroon;
    border-color: red;
    color: white;
    box-shadow: 0 0 8px red;
}

.pt-cell.empty {
    background: transparent;
    border: none;
    cursor: default;
    pointer-events: none;
}

#ec-symbol {
    font-size: 80px;
    color: red;
    font-weight: bold;
    line-height: 1;
}

#ec-fullname {
    font-size: 20px;
    color: white;
    margin-top: 4px;
    text-align: center;
}

#ec-info-grid {
    margin-top: 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 20px;
    width: 100%;
    max-width: 360px;
}

.ec-info-row {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    border-bottom: 1px solid #333;
    padding: 3px 0;
}

.ec-info-label { color: #aaa; }
.ec-info-val { color: red; }

#ec-stability {
    margin-top: 12px;
    font-size: 16px;
    font-weight: bold;
    padding: 4px 16px;
    border-radius: 6px;
}

.stable { color: red; border: 1px solid red; }
.unstable { color: red; border: 1px solid red; }

/* Inputs row at bottom */
#ec-inputs {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    align-items: center;
    flex-shrink: 0;
}

.ec-input-group {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
}

.ec-input-group label {
    color: red;
    font-size: 13px;
    white-space: nowrap;
}

.ec-num-input {
    width: 50px;
    padding: 5px 6px;
    font-size: 14px;
    border-radius: 6px;
    border: 1px solid maroon;
    background: #000;
    color: red;
    outline: none;
    text-align: center;
    -moz-appearance: textfield;
}
.ec-num-input::-webkit-outer-spin-button,
.ec-num-input::-webkit-inner-spin-button {

}
#cc-elem-num::placeholder { color: red; text-shadow: 0 0 3px red, 0 0 8px red; opacity: 0.75; }
.ec-num-input::placeholder { color: red; text-shadow: 0 0 3px red, 0 0 8px red; opacity: 0.75; }

#ec-menu-btn {
    padding: 6px 14px;
    font-size: 15px;
    border: 0;
    border-radius: 6px;
    background: #444;
    color: red;
    cursor: pointer;
    margin-left: 2px;
    flex-shrink: 0;
  
}

/* ===================== WORD DEFINITIONS PAGE ===================== */
/* Word page container — identical to #chat-container */
#word-page {

}
/* Input row — same as #input-container */

}
/* Text input — exact same as #user-input */
#word-input {

/* Send button — exact same as #send-btn */

    padding: 6px 14px;

/* Exit button — exact same as #menu-btn */
#word-menu-btn {
    padding: 6px 14px;

    border: 0;
    border-radius: 6px;

    color: red;

    margin-left: 2px;
   
}



/* ===================== COMPOUND CREATOR ===================== */
/* The compound creator slides in on the LEFT side of ec-body */
#cc-panel {
    display: none;
    flex-direction: column;
    flex: 1.4;
    min-width: 0;
    background: black;
    border: 1px solid maroon;
    border-radius: 8px;
    box-sizing: border-box;
    padding: 8px;
    position: relative;
}
#cc-panel.show { display: flex; }

/* CC panel buttons — absolute, same positions as EC viewer buttons */


/* Elements display grid — max 20, 4 cols x 5 rows */
#cc-elements-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    flex-shrink: 0;
    margin-bottom: 6px;
    margin-top: 36px;
}

/* Individual element block in compound */
.cc-element-block {
    background: #222;
    border: 1px solid #444;
    border-radius: 4px;
    padding: 4px 4px 4px 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: pointer;
    min-height: 48px;
    box-sizing: border-box;
    transition: border-color 0.2s;
    overflow: hidden;
}
.cc-element-block:hover {
    border-color: red;
    background: #330000;
}
.cc-element-block .cc-sym {
    font-size: 16px;
    color: red;
    font-weight: bold;
    line-height: 1;
    display: flex;
    align-items: center;
    gap: 3px;
}
.cc-element-block .cc-name {
    font-size: 9px;
    color: #aaa;
    text-align: center;
    word-break: break-word;
    overflow: hidden;
    max-width: 100%;
    line-height: 1.1;
    /* shrink text to fit */
    overflow-wrap: break-word;
}
.cc-element-block .cc-amt {
    font-size: 11px;
    color: red;
    font-weight: bold;
}
.cc-element-block .cc-amt-label {
    position: absolute;
    top: 3px;
    left: 4px;
    font-size: 8px;
    color: red;
    line-height: 1;
    pointer-events: none;
}

/* Compound name display — below the grid */
#cc-compound-name {
    text-align: center;
    font-size: 15px;
    color: white;
    padding-top: 6px;
    flex-shrink: 0;
    margin-top: 2px;
}

/* CC periodic panel — right of cc-panel, same style as ec-periodic */
#cc-periodic {
    display: none;
    flex-direction: column;
    flex: 1.4;
    min-width: 0;
    background: black;
    border: 1px solid maroon;
    border-radius: 8px;
    overflow-y: auto;
    overflow-x: auto;
    padding: 8px;
    box-sizing: border-box;
}
#cc-periodic.show { display: flex; }

/* Close Table button inside CC periodic — same style as pt-close-btn */
#cc-close-btn {
    position: sticky;
    top: 0;
    align-self: flex-end;
    padding: 4px 12px;
    font-size: 13px;
    font-weight: bold;
    border: 0;
    border-radius: 6px;
    background: #000;
    color: red;
    cursor: pointer;
    z-index: 12;
   
    white-space: nowrap;
    flex-shrink: 0;
    margin-bottom: 4px;
}


/* Dimmed cell — element already in compound */
.pt-cell.cc-used {
    opacity: 0.3;
    filter: grayscale(1);
    pointer-events: none;
    cursor: default;
}
#cc-periodic-grid {
    display: grid;
    grid-template-columns: repeat(18, 1fr);
    gap: 2px;
    padding: 4px;
    padding-top: 18px;
    flex: 1;
    overflow: visible;
}

/* Inputs row — compound creator mode (same layout as ec-inputs) */
#cc-inputs {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    align-items: center;
    flex-shrink: 0;
}
.cc-input-group {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
}
.cc-input-group label {

    background: #111;
    color: red;
    outline: none;
    text-align: center;
}
#ca-input::placeholder { color: #555 !important; }

<script>
// Inject color styles immediately in <head> before ANY rendering
// so launcher-btn transition never animates from red to white
(function() {
    var vortexMode = localStorage.getItem('vortexMode');
    var isAdmin = (vortexMode === 'admin');
    var s = document.createElement('style');
    if (!isAdmin) {
        s.id = 'vortex-no-admin-styles';
        s.textContent = [
            '*{color:white !important; border-color: #555 !important;}',
            '::placeholder{color:white !important; opacity:1 !important;}',
            '#user-input::placeholder,#word-input::placeholder{color:#555 !important; opacity:1 !important;}',
            '#ac-svg circle{stroke:white !important;}',
            '#ac-svg text{fill:white !important;}',
            '#ac-dots-1 circle,#ac-dots-2 circle,#ac-dots-3 circle,#ac-dots-4 circle{fill:white !important;}',
            '#menu-overlay-title,#chem-overlay-title{text-shadow:0 0 10px rgba(255,255,255,0.55), 0 0 25px rgba(255,255,255,0.35), 0 0 50px rgba(255,255,255,0.2) !important;}'
        ].join('');
    } else {
        s.id = 'vortex-admin-styles';
        s.textContent = '*{color:red !important;}.stable{color:red !important; border-color:red !important;}.unstable{color:red !important;}';
    }
    document.head.appendChild(s);
})();
</script>

<script>
// Prevent flash of header: keep body hidden until overlay is shown
document.addEventListener('DOMContentLoaded', function() {
    var mo = document.getElementById('menu-overlay');
    if (mo) mo.classList.add('show');
    document.body.style.visibility = 'visible';

    // Also watch for live changes to vortexMode (e.g. user logs in/out
    // in another tab) and toggle the override without a page reload.
    window.addEventListener('storage', function(e) {
        if (e.key !== 'vortexMode') return;
        var nowAdmin = (e.newValue === 'admin');
        var existing = document.getElementById('vortex-no-admin-styles');
        var existingAdmin = document.getElementById('vortex-admin-styles');
        if (existingAdmin && !nowAdmin) existingAdmin.remove();
        if (!nowAdmin && !existing) {
            var s = document.createElement('style');
            s.id = 'vortex-no-admin-styles';
            s.textContent = [
                '*{color:white !important; border-color: #555 !important;}',
                '::placeholder{color:white !important; opacity:1 !important;}',
                '#user-input::placeholder,#word-input::placeholder{color:#555 !important; opacity:1 !important;}',
                '#ac-svg circle{stroke:white !important;}',
                '#ac-svg text{fill:white !important;}',
                '#ac-dots-1 circle,#ac-dots-2 circle,#ac-dots-3 circle,#ac-dots-4 circle{fill:white !important;}',
                '#menu-overlay-title,#chem-overlay-title{text-shadow:0 0 10px rgba(255,255,255,0.55), 0 0 25px rgba(255,255,255,0.35), 0 0 50px rgba(255,255,255,0.2) !important;}'
            ].join('');
            document.head.appendChild(s);
            console.log('[Vortex] Switched to regular — no-admin styles applied.');
        } else if (nowAdmin && existing) {
            existing.remove();
            var adminS = document.createElement('style');
            adminS.id = 'vortex-admin-styles';
            adminS.textContent = '*{color:red !important;}.stable{color:red !important; border-color:red !important;}.unstable{color:red !important;}';
            document.head.appendChild(adminS);
            console.log('[Vortex] Switched to admin — no-admin styles removed, admin styles applied.');
        }
    });
    // ──────────────────────────────────────────────────────────────────
});
</script>

const dupedDefinitions = {};
const dupedIndex = {};
(function extractDupes() {
  const scripts = document.querySelectorAll("script");
  const regex = /"([^"]+)"\s*:\s*"([^"]+)"/g;

  scripts.forEach(script => {
    let match;
    while ((match = regex.exec(script.textContent)) !== null) {
      const word = match[1].toLowerCase();
      const def = match[2];

      if (!dupedDefinitions[word]) {
        dupedDefinitions[word] = [];
      }
      dupedDefinitions[word].push(def);
    }
  });
   for (const w in dupedDefinitions) {
    if (dupedDefinitions[w].length < 2) {
      delete dupedDefinitions[w];
    }
  }
})();

function sendMessage() {
    const userMessage = document.getElementById('user-input').value.trim();
    if (!userMessage) return;

    displayMessage(userMessage, 'user');
    document.getElementById('user-input').value = '';

    const botReply = generateSmartReply(userMessage);
    setTimeout(() => displayMessage(botReply, 'bot'), 300);
}

function displayMessage(message, sender) {
    const chatBox = document.getElementById('chat-box');
    const messageElement = document.createElement('div');
    messageElement.classList.add('message', sender);
    messageElement.textContent = message;
    chatBox.appendChild(messageElement);
    chatBox.scrollTop = chatBox.scrollHeight;
}


// ----- helper: compute step-by-step simplification -----
// input: mathText (already transformed: pi replaced, sqrt -> Math.sqrt, % converted, implied * inserted, etc.)
// returns: { success: boolean, stepsText: string, value: number|null }
function computeSteps(origMathText) {
    try {
        // Work on a copy for step-by-step replacement
        let expr = origMathText;

        // We'll collect human-friendly steps
        const steps = [];
        steps.push("Transformed expression: " + expr);

        // Evaluate parenthesized factorials first: ( ... )!  -> evaluate inner, then factorial
        // Repeat until none remain
        let loopGuard = 0;
        while (/\([^()]+\)!/.test(expr) && loopGuard < 200) {
            loopGuard++;
            expr = expr.replace(/\(([^()]+)\)!/g, (m, inner) => {
                // Evaluate inner safely
                const innerVal = eval(inner);
                const intVal = Math.round(innerVal); // factorial needs integer; we'll use nearest integer if match
                const f = fact(intVal);
                steps.push(`Evaluated ${m} -> (${innerVal}) then factorial -> ${f}`);
                return `(${f})`;
            });
        }

        // Next evaluate any remaining simple factorials like 5! -> (120)
        expr = expr.replace(/(\d+)!/g, (m, n) => {
            const f = fact(n);
            steps.push(`Replaced ${m} -> (${f})`);
            return `(${f})`;
        });

        // Now iteratively evaluate innermost parentheses to show how expression reduces
        loopGuard = 0;
        while (/\([^()]+\)/.test(expr) && loopGuard < 1000) {
            loopGuard++;
            expr = expr.replace(/\(([^()]+)\)/g, (m, inner) => {
                // Avoid infinite recursion: trim inner
                const trimmed = inner.trim();
                // If inner still contains 'Math' or other JS tokens, eval directly
                const v = eval(trimmed);
                const rounded = Math.round((v + Number.EPSILON) * 1000000) / 1000000;
                steps.push(`${m} -> ${rounded}`);
                return rounded;
            });
        }

        // After parenthesis are gone, evaluate the final expression
        const finalVal = eval(expr);
        const finalRounded = Math.round((finalVal + Number.EPSILON) * 1000000) / 1000000;
        steps.push("Final evaluation: " + finalRounded);

        return { success: true, stepsText: steps.join("\n"), value: finalRounded };
    } catch (err) {
        return { success: false, stepsText: "", value: null };
    }
}
// Factorial function
function factorial(n) {
    n = Math.floor(n); // ensure integer
    if (n < 0) return NaN;
    if (n === 0 || n === 1) return 1;
    let res = 1;
    for (let i = 2; i <= n; i++) res *= i;
    return res;
}

// ----- REPLACE your existing generateSmartReply with this patched version -----
function generateSmartReply(input) {
    const text = String(input).toLowerCase().trim();

    // Quick early exit for empty input
    if (!text) return variations.unknown[Math.floor(Math.random() * variations.unknown.length)];

    // --- Prepare mathText (no spaces required) ---
    try {
        let mathText = text.replace(/\s+/g, "");          // remove all spaces

        // Basic replacements
        mathText = mathText.replace(/x/gi, "*");          // x as multiply
        mathText = mathText.replace(/\^/g, "**");         // caret -> JS power
        mathText = mathText.replace(/÷/g, "/");           // division symbol

        // Handle implied multiplication (number or ) immediately before '(' )
        mathText = mathText.replace(/(\d|\))\(/g, "$1*(");

        // Handle implied multiplication for ) followed by number: e.g. )(3 -> )*3
        mathText = mathText.replace(/\)(?=\d)/g, ")*");

        // Handle number directly next to parentheses the other direction: )3 -> )*3
        mathText = mathText.replace(/(\))(\d)/g, "$1*$2");

        // Ensure multiplication between number and pi: 2π -> 2*π, also between ) and π
        mathText = mathText.replace(/(\d|\))(?=π)/g, "$1*");
        mathText = mathText.replace(/π(?=\d|\()/g, "π*");

        // Support "pi" typed as letters as well (2pi -> 2*pi)
        mathText = mathText.replace(/(\d|\))(?=pi\b)/g, "$1*");
        mathText = mathText.replace(/pi(?=\d|\()/g, "pi*");

        // Convert percent like 12.5% -> (12.5/100)
        mathText = mathText.replace(/(\d+(\.\d+)?)%/g, "($1/100)");

        // Convert sqrt(...) to Math.sqrt(...)
        mathText = mathText.replace(/sqrt\(/gi, "Math.sqrt(");

        // Replace π / pi with numeric digits so it can't glue to other numbers
        mathText = mathText.replace(/π/g, String(Math.PI));
        mathText = mathText.replace(/\bpi\b/gi, String(Math.PI));

        // NOTE: we intentionally DO NOT replace 'e' to avoid interfering with scientific notation like 1e3

        // At this point we should only have digits, operators, parentheses, dots, and maybe "Math"
        // Disallow any alphabetic characters except the "Math" token we just inserted.
        if (/[a-zA-Z]/.test(mathText) && !/Math/.test(mathText)) {
            return "I couldn't solve that math problem.";
        }

        // Final safe-character check
        if (!/^[0-9+\-*/().%*]*$/.test(mathText.replace(/Math\.sqrt/g, ""))) {
            return "I couldn't solve that math problem.";
        }

        // Evaluate
        const result = eval(mathText);
        if (typeof result === "number" && !isNaN(result)) {
            const rounded = Math.round((result + Number.EPSILON) * 1000000) / 1000000;
            return `The answer is: ${rounded}`;
        } else {
            return "I couldn't solve that math problem.";
        }
    } catch (e) {
        return "I couldn't solve that math problem.";
    }
}

// Helper used as fallback to your knowledge system (keeps original behavior)
function smartDefinition(rawInput) {

const text = rawInput.toLowerCase().trim();

if (dupedDefinitions[text]) {
  if (!dupedIndex[text]) dupedIndex[text] = 0;

  const defs = dupedDefinitions[text];
  const i = dupedIndex[text];

  dupedIndex[text] = (i + 1) % defs.length;
  return defs[i];
}


  
  // --- Question detection and knowledge matching (unchanged behavior) ---
    if (text.match(/\bwhat|who|where|when|why|how\b/)) {
        const words = text.split(/[\s,?.!]+/);
        let definitions = [];
        for (let w of words) {
            if (knowledge && knowledge[w]) definitions.push(knowledge[w]);
        }
        if (definitions.length > 0) return buildResponse(definitions, text);
        return variations.unknown[Math.floor(Math.random() * variations.unknown.length)];
    }

    // General knowledge matching
    const words = text.split(/[\s,?.!]+/);
    let matches = [];
    for (let w of words) {
        if (knowledge && knowledge[w]) matches.push(knowledge[w]);
    }
    if (matches.length > 0) return buildResponse(matches, text);

    return variations.unknown[Math.floor(Math.random() * variations.unknown.length)];
}



// Combine multiple definitions into a natural reply
function buildResponse(defArray, inputText) {
    const shuffled = defArray.sort(() => Math.random() - 0.5);
    let response = shuffled.join(" ");
    
    if (memory.name) {
        response = `${memory.name}, ${response}`;
    }

    response = response.charAt(0).toUpperCase() + response.slice(1);
    if (!/[.?!]$/.test(response)) response += ".";
    
    return response;
}

(function() {
    var wordInput = document.getElementById('word-input');
    var wordSendBtn = document.getElementById('word-send-btn');
    var wordChatBox = document.getElementById('word-chat-box');

    function displayWordMessage(message, sender) {
        var el = document.createElement('div');
        el.classList.add('message', sender);

    if (wordInput) wordInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') sendWordMessage();
    });
})();
</script>

<script>
// ========== MENU OVERLAY LOGIC ==========
(function() {
    var menuOverlay = document.getElementById('menu-overlay');
    var chemOverlay = document.getElementById('chem-overlay');
    var chatContainer = document.getElementById('chat-container');
    var wordPage = document.getElementById('word-page');
    var elementPage = document.getElementById('element-page');
    var pageTitle = document.getElementById('page-title');

    // Start on menu screen
    menuOverlay.classList.add('show');

    function showMenu() {
        chemOverlay.classList.remove('show');
        menuOverlay.classList.add('show');
        chatContainer.style.display = 'none';
        wordPage.style.display = 'none';
        elementPage.style.display = 'none';
        if (typeof closeAtomCloud === 'function' && typeof acIsOpen !== 'undefined' && acIsOpen) closeAtomCloud();
    }

    function showChem() {
        menuOverlay.classList.remove('show');
        chemOverlay.classList.add('show');
    }

    function showPage(page) {
        chatContainer.style.display = 'none';
        wordPage.style.display = 'none';
        elementPage.style.display = 'none';
        menuOverlay.classList.remove('show');
        chemOverlay.classList.remove('show');
        // Close atom cloud if open
        if (typeof closeAtomCloud === 'function' && typeof acIsOpen !== 'undefined' && acIsOpen) closeAtomCloud();

        if (page === 'math') {
            chatContainer.style.display = 'flex';
            pageTitle.textContent = 'Algorithm Bot - Math Solver';
        } else if (page === 'word') {
            wordPage.style.display = 'flex';
            pageTitle.textContent = 'Algorithm Bot - Word Definitions';
        } else if (page === 'ec') {
            elementPage.style.display = 'flex';
            pageTitle.textContent = 'Algorithm Bot - Element Lab';
        }
    }

    // Main menu launcher buttons
    document.getElementById('menu-go-math').addEventListener('click', function() { showPage('math'); });
    document.getElementById('menu-go-word').addEventListener('click', function() { showPage('word'); });
    document.getElementById('menu-go-ec').addEventListener('click', function() { showChem(); });

    // Chemistry Select buttons
    document.getElementById('chem-go-ec').addEventListener('click', function() {
        showPage('ec');
    });
    document.getElementById('chem-go-cc').addEventListener('click', function() {
        // Show element-page but DON'T let EC viewer flash — enterCC hides it
        chatContainer.style.display = 'none';
        wordPage.style.display = 'none';
        menuOverlay.classList.remove('show');
        chemOverlay.classList.remove('show');
        elementPage.style.display = 'flex';
        pageTitle.textContent = 'Algorithm Bot - Compound Lab';
        // Immediately hide EC viewer so there's no flash
        var ecv = document.getElementById('ec-viewer-wrap');
        var eci = document.getElementById('ec-inputs');
        if (ecv) ecv.style.display = 'none';
        if (eci) eci.style.display = 'none';
        // Then fire enterCC (which sets everything properly)
        function tryEnterCC(attempts) {
            if (window._enterCC) {
                window._enterCC();
            } else if (attempts > 0) {
                setTimeout(function() { tryEnterCC(attempts - 1); }, 30);
            }
        }
        tryEnterCC(30);
    });

    // Exit buttons — all go back to main menu
    ['menu-btn', 'word-menu-btn', 'ec-menu-btn', 'cc-menu-btn'].forEach(function(id) {
        var btn = document.getElementById(id);
        if (btn) btn.addEventListener('click', function(e) {
            e.stopPropagation();
            showMenu();
        });
    });

    window._showPage = showPage;
    window._showMenu = showMenu;
    window._chemOverlay = chemOverlay;
})();
</script>

    // Evenly space n dots around a circle of radius r centered at (cx,cy), starting from top
    function renderDots(groupId, n, r) {
        var g = document.getElementById(groupId);
        if (!g) return;
        g.innerHTML = '';
        if (n <= 0) return;
        for (var i = 0; i < n; i++) {
            var angleDeg = -90 + (360 / n) * i; // start at top
            var rad = angleDeg * Math.PI / 180;
            var x = 150 + r * Math.cos(rad);
            var y = 150 + r * Math.sin(rad);
            var c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            c.setAttribute('cx', x.toFixed(2));
            c.setAttribute('cy', y.toFixed(2));
            c.setAttribute('r', '4');
            c.setAttribute('fill', 'red');
            g.appendChild(c);
        }
    }

    function updateAtomCloud() {
        var pRaw = document.getElementById('ec-protons').value;
        var nRaw = document.getElementById('ec-neutrons').value;
        var eRaw = document.getElementById('ec-electrons').value;
        var pSet = pRaw !== '' && !isNaN(parseInt(pRaw)) && parseInt(pRaw) >= 0;
        var nSet = nRaw !== '' && !isNaN(parseInt(nRaw)) && parseInt(nRaw) >= 0;
        var eSet = eRaw !== '' && !isNaN(parseInt(eRaw)) && parseInt(eRaw) >= 0;
        var p = pSet ? Math.max(0, parseInt(pRaw)) : 0;
        var n = nSet ? Math.max(0, parseInt(nRaw)) : 0;
        var e = eSet ? Math.max(0, parseInt(eRaw)) : 0;

        // Nucleus P / N labels
        document.getElementById('ac-proton-label').textContent = 'P ' + (pSet ? p : '-');
        document.getElementById('ac-neutron-label').textContent = 'N ' + (nSet ? n : '-');

        var elData = elementByZ[p];

        // Distribute electrons: shell 1=2, shell 2=8, shell 3=18, shell 4=32
        var rem = eSet ? e : 0;
        var s1 = 0, s2 = 0, s3 = 0, s4 = 0;
        if (rem > 0) { s1 = Math.min(2,  rem); rem -= s1; }
        if (rem > 0) { s2 = Math.min(8,  rem); rem -= s2; }
        if (rem > 0) { s3 = Math.min(18, rem); rem -= s3; }
        if (rem > 0) { s4 = Math.min(32, rem); }

        // Shell count labels — '-' when that shell isn't reached yet
        var s1Label = document.getElementById('ac-shell-1-label');
        var s2Label = document.getElementById('ac-shell-2-label');
        var s3Label = document.getElementById('ac-shell-3-label');
        var s4Label = document.getElementById('ac-shell-4-label');

        if (!eSet) {
            s1Label.textContent = '-';
            s2Label.textContent = '-';
            s3Label.textContent = '-';
            s4Label.textContent = '-';
        } else {
            s1Label.textContent = String(s1);
            s2Label.textContent = e > 2  ? String(s2) : '-';
            s3Label.textContent = e > 10 ? String(s3) : '-';
            s4Label.textContent = e > 28 ? String(s4) : '-';
        }

        // Render evenly-spaced dots on each shell
        renderDots('ac-dots-1', eSet ? s1 : 0, 57);
        renderDots('ac-dots-2', eSet && e > 2  ? s2 : 0, 85);
        renderDots('ac-dots-3', eSet && e > 10 ? s3 : 0, 113);
        renderDots('ac-dots-4', eSet && e > 28 ? s4 : 0, 145);

        // Stability
        var massNum = p + n;
        var acStab = document.getElementById('ac-stability');
        if (elData) {
            var stableCheck = false;
            if (elData.si.length > 0) {
                stableCheck = elData.si.indexOf(massNum) !== -1;
            } else {
                stableCheck = elData.stable && massNum > 0;
            }
            acStab.textContent = stableCheck ? 'Stable' : 'Unstable';
            acStab.className = stableCheck ? 'stable' : 'unstable';
        } else if (p === 0) {
            acStab.textContent = 'Stable';
            acStab.className = 'stable';
        } else {
            acStab.textContent = 'Unstable';
            acStab.className = 'unstable';
        }

        document.getElementById('ac-bond').textContent = elData ? getAtomicBond(elData) : '-';
    }

    function openAtomCloud() {
        acIsOpen = true;
        acView.style.display = 'flex';
        if (acAtomCloudBtn) acAtomCloudBtn.textContent = 'Text Mode';
        updateAtomCloud();
    }

    function closeAtomCloud() {
        acIsOpen = false;
        acView.style.display = 'none';
        if (acAtomCloudBtn) acAtomCloudBtn.textContent = 'Visual Mode';
    }

    if (acAtomCloudBtn) acAtomCloudBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        ecOptMenu.classList.remove('open');
        if (acIsOpen) {
            closeAtomCloud();
        } else {
            openAtomCloud();
        }
    });

    // ── EC protons/neutrons/electrons: focus clears 0, blur restores ──

    // Periodic table toggle
    var ptToggleBtn = document.getElementById('pt-toggle-btn');
    var ptCloseBtn = document.getElementById('pt-close-btn');
    var ecPeriodic = document.getElementById('ec-periodic');

    // Close Table button starts hidden (table starts hidden)
    ptCloseBtn.style.display = 'none';

    ptToggleBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        ecPeriodic.classList.add('show');
        ptToggleBtn.style.display = 'none';
        ptCloseBtn.style.display = '';
    });

    ptCloseBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        ecPeriodic.classList.remove('show');
        ptToggleBtn.style.display = '';
        ptCloseBtn.style.display = 'none';
    });

    // Page switching now handled by menu overlay
})();
</script>

        // Build name→formula lookup from compounds list
        // Also build formula parser for chemical formulas like H2O, CO2
        function parseFormula(str) {
            // Parse formula string like H2O, CO2, NaCl, Fe2O3
            var result = {};
            var re = /([A-Z][a-z]?)(\d*)/g;
            var m;
            while ((m = re.exec(str)) !== null) {
                if (!m[1]) continue;
                var sym = m[1];
                var cnt = m[2] ? parseInt(m[2]) : 1;
                result[sym] = (result[sym] || 0) + cnt;
            }
            return Object.keys(result).length ? result : null;
        }

        function findCompoundByName(query) {
            var q = query.trim().toLowerCase();
            // Try exact name match first
            for (var i = 0; i < compounds.length; i++) {
                var cname = compounds[i].name.toLowerCase();
                if (cname.indexOf(q) === 0 || cname.indexOf('/ ' + q) >= 0 || cname.indexOf('/ ' + q) >= 0) {
                    return compounds[i].f;
                }
            }
            // Partial name match
            for (var i = 0; i < compounds.length; i++) {
                if (compounds[i].name.toLowerCase().indexOf(q) >= 0) {
                    return compounds[i].f;
                }
            }
            return null;
        }

        function applyFormulaToCC(formula) {
            if (!formula) return false;
            // Validate all symbols exist
            for (var sym in formula) {
                var found = false;
                for (var z = 1; z <= 118; z++) {
                    if (elementByZ[z] && elementByZ[z].sym === sym) { found = true; break; }
                }
                if (!found) return false;
            }
            // Clear current items and load new ones
            ccItems = [];
            for (var sym in formula) {
                ccItems.push({sym: sym, name: (function(s){ for(var z=1;z<=118;z++){if(elementByZ[z]&&elementByZ[z].sym===s)return elementByZ[z].name;} return s; })(sym), amount: formula[sym]});
            }
            render();
            return true;
        }

            // Try as formula first (starts with uppercase letter)
            if (/^[A-Z]/.test(query)) {
                formula = parseFormula(query);
                // Check parsed formula actually matches a compound
                if (formula && Object.keys(formula).length) {
                    // Try to match against database too for accuracy
                    var dbMatch = findCompoundByName(query);
                    if (dbMatch) formula = dbMatch;
                }
            }
            // Try as name
            if (!formula) {
                formula = findCompoundByName(query);
            }
            // Try formula parse as fallback
            if (!formula && /[A-Z]/.test(query)) {
                formula = parseFormula(query);
            }

            if (formula && applyFormulaToCC(formula)) {

        function updateCcUsed() {
            var usedSyms = {};

            var cells = ccPeriodicGrid.querySelectorAll('.pt-cell:not(.empty)');

                    cell.classList.add('cc-used');
                } else {
                    cell.classList.remove('cc-used');
                }
            });
        }

        function updateName() {
            if (ccItems.length === 0) { ccName.textContent = 'Unknown Compound'; return; }
            var formula = {};
            ccItems.forEach(function(item) { formula[item.sym] = (formula[item.sym]||0) + item.amount; });
            for (var i = 0; i < compounds.length; i++) {
                if (fMatch(formula, compounds[i].f)) { ccName.textContent = compounds[i].name; return; }
            }
            // No match — stay as Unknown Compound
            ccName.textContent = 'Unknown Compound';
        }

        function fMatch(a, b) {
            var ak = Object.keys(a), bk = Object.keys(b);
            if (ak.length !== bk.length) return false;
            for (var k in a) { if (a[k] !== b[k]) return false; }
            for (var k in b) { if (a[k] !== b[k]) return false; }
            return true;
        }
    }
    init();
})();
</script>

<script>

(function() {
    'use strict';

    // ───────────────────────────────────────────────────────────────────
    // 1. PAGE DETECTION (only for default color fallback)
    // ───────────────────────────────────────────────────────────────────
    const pageTitle = document.title.toLowerCase();
    const isAdminFallback = pageTitle.includes('admin');
    const defaultMouseColor = isAdminFallback ? 'rainbow' : 'red';
    
    console.log(`[Unified Mouse V2] Detected: ${isAdminFallback ? 'ADMIN' : 'REGULAR'} mode (fallback)`);

    // ───────────────────────────────────────────────────────────────────
    // 2. GLOBAL VARIABLES
    // ───────────────────────────────────────────────────────────────────
    let mouseActive = false;
    let rainbow = false;
    let currentColor = defaultMouseColor;
    let cursorElement = null;
    let isMouseInsideBounds = false;  // hidden until mouse enters
    let storagePrefix = 'vortex';     // default to regular

    // ───────────────────────────────────────────────────────────────────
    // 3. DETERMINE STORAGE PREFIX based on 'vortexMode'
    // ───────────────────────────────────────────────────────────────────
    function getStoragePrefix() {
        const mode = localStorage.getItem('vortexMode');
        return (mode === 'admin') ? 'vortexadmin' : 'vortex';
    }

    // ───────────────────────────────────────────────────────────────────
    // 4. CREATE CURSOR ELEMENT (with Vortex Admin rainbow-ready gradient)
    // ───────────────────────────────────────────────────────────────────
    function createCursorElement() {
        cursorElement = document.getElementById('__rbCursor');
        
        if (!cursorElement) {
            cursorElement = document.createElement('div');
            cursorElement.id = '__rbCursor';
            cursorElement.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 32px;
                height: 32px;
                pointer-events: none;
                z-index: 2147483647;
                transform: translate(-4px, -4px);
                display: none;
            `;
            
            cursorElement.innerHTML = `
                <svg viewBox="0 0 32 32" width="100%" height="100%">
                    <defs>
                        <linearGradient id="rbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%"   stop-color="#ff0000" />
                            <stop offset="20%"  stop-color="#ff0000" />
                            <stop offset="40%"  stop-color="#ff0000" />
                            <stop offset="60%"  stop-color="#ff0000" />
                            <stop offset="80%"  stop-color="#ff0000" />
                            <stop offset="100%" stop-color="#ff0000" />
                        </linearGradient>
                    </defs>
                    <polygon points="0,0 0,28 8,20 14,30 18,28 12,18 20,18" fill="url(#rbGradient)" />
                </svg>
            `;
            
            document.body.appendChild(cursorElement);
        }
        
        return cursorElement;
    }

    // ───────────────────────────────────────────────────────────────────
    // 5. APPLY COLOR (Vortex Admin style rainbow via stop animation)
    // ───────────────────────────────────────────────────────────────────
    function applyMouseColor(color) {
        if (!cursorElement) return;
        
        const polygon = cursorElement.querySelector('polygon');
        const svg     = cursorElement.querySelector('svg');
        const stops   = cursorElement.querySelectorAll('stop');
        
        if (!polygon || !stops.length) return;

        if (color === 'rainbow') {
            rainbow = true;
            polygon.setAttribute('fill', 'url(#rbGradient)');
            stops.forEach(stop => {
                stop.style.animation = 'rainbowShift 3s linear infinite';
            });
            cursorElement.classList.add('rainbow-glow');
            if (svg) svg.style.filter = '';
        } else {
            rainbow = false;
            polygon.setAttribute('fill', color);
            stops.forEach(stop => {
                stop.style.animation = 'none';
                stop.style.stopColor = color;  // fallback solid
            });
            cursorElement.classList.remove('rainbow-glow');
            if (svg) svg.style.filter = `drop-shadow(0 0 4px ${color}) drop-shadow(0 0 10px ${color}) drop-shadow(0 0 20px ${color})`;
        }
        
        currentColor = color;
    }

    // ───────────────────────────────────────────────────────────────────
    // 6. ACTIVATE / DEACTIVATE
    // ───────────────────────────────────────────────────────────────────
    function activateMouse() {
        if (!cursorElement) createCursorElement();
        
        if (isMouseInsideBounds) {
            cursorElement.style.display = 'block';
        }
        mouseActive = true;
        
        const savedColor = localStorage.getItem(`${storagePrefix}MouseColor`) || defaultMouseColor;
        applyMouseColor(savedColor);
        
        localStorage.setItem(`${storagePrefix}MouseEnabled`, 'true');
    }

    function deactivateMouse() {
        if (cursorElement) {
            cursorElement.style.display = 'none';
        }
        mouseActive = false;
        localStorage.setItem(`${storagePrefix}MouseEnabled`, 'false');
    }

    // ───────────────────────────────────────────────────────────────────
    // 7. REFRESH FROM LATEST LOCALSTORAGE
    // ───────────────────────────────────────────────────────────────────
    function refreshFromLocalStorage() {
        storagePrefix = getStoragePrefix();  // Re-check mode each time
        
        const enabledStr = localStorage.getItem(`${storagePrefix}MouseEnabled`);
        const color = localStorage.getItem(`${storagePrefix}MouseColor`) || defaultMouseColor;

        const shouldBeActive = enabledStr === 'true';

        if (shouldBeActive !== mouseActive) {
            if (shouldBeActive) {
                activateMouse();
            } else {
                deactivateMouse();
            }
        } else if (shouldBeActive) {
            applyMouseColor(color);
        }

        if (cursorElement) {
            cursorElement.style.display = (mouseActive && isMouseInsideBounds) ? 'block' : 'none';
        }
        
        console.log(`[Unified Mouse V2] Using prefix: ${storagePrefix} (mode: ${localStorage.getItem('vortexMode') || 'regular'})`);
    }

    // ───────────────────────────────────────────────────────────────────
    // 8. MOUSE TRACKING + BOUNDARY DETECTION
    // ───────────────────────────────────────────────────────────────────
    function updateCursorPosition(e) {
        if (!mouseActive || !cursorElement) return;
        
        const x = e.clientX;
        const y = e.clientY;
        const w = window.innerWidth;
        const h = window.innerHeight;
        
        const buffer = 5;
        const inside = (
            x >= -buffer && x <= w + buffer &&
            y >= -buffer && y <= h + buffer
        );
        
        if (inside) {
            if (!isMouseInsideBounds) {
                isMouseInsideBounds = true;
                refreshFromLocalStorage();
                if (mouseActive) cursorElement.style.display = 'block';
            }
            cursorElement.style.left = x + 'px';
            cursorElement.style.top = y + 'px';
        } else {
            if (isMouseInsideBounds) {
                isMouseInsideBounds = false;
                refreshFromLocalStorage();
                cursorElement.style.display = 'none';
            }
        }
    }

    function handleMouseLeave() {
        if (cursorElement) {
            isMouseInsideBounds = false;
            refreshFromLocalStorage();
            cursorElement.style.display = 'none';
        }
    }

    function handleMouseEnter() {
        if (cursorElement) {
            isMouseInsideBounds = true;
            refreshFromLocalStorage();
            if (mouseActive) cursorElement.style.display = 'block';
        }
    }

    // ───────────────────────────────────────────────────────────────────
    // 9. EVENT LISTENERS
    // ───────────────────────────────────────────────────────────────────
    function attachMouseListeners() {
        document.addEventListener('mousemove', updateCursorPosition);
        document.addEventListener('mouseleave', handleMouseLeave);
        document.addEventListener('mouseenter', handleMouseEnter);
        
        window.addEventListener('mouseout', e => {
            if (!e.relatedTarget && !e.toElement) handleMouseLeave();
        });
    }

    // ───────────────────────────────────────────────────────────────────
    // 10. LIVE SYNC FROM OTHER TABS
    // ───────────────────────────────────────────────────────────────────
    window.addEventListener('storage', e => {
        if (e.key.startsWith('vortex') && (e.key.includes('MouseEnabled') || e.key.includes('MouseColor') || e.key === 'vortexMode')) {
            refreshFromLocalStorage();
        }
    });

    // ───────────────────────────────────────────────────────────────────
    // 11. INITIAL LOAD
    // ───────────────────────────────────────────────────────────────────
    function loadSavedMousePreferences() {
        refreshFromLocalStorage();
    }

    // ───────────────────────────────────────────────────────────────────
    // 12. INITIALIZE – add EXACT Vortex Admin rainbow keyframes
    // ───────────────────────────────────────────────────────────────────
    function initialize() {
        if (!document.getElementById('unifiedMouseStyles')) {
            const style = document.createElement('style');
            style.id = 'unifiedMouseStyles';
            style.textContent = `
                @keyframes rainbowShift {
                    0%   { stop-color: red;    }
                    20%  { stop-color: orange; }
                    40%  { stop-color: yellow; }
                    60%  { stop-color: green;  }
                    80%  { stop-color: blue;   }
                    100% { stop-color: violet; }
                }

                * {
                    cursor: none !important;
                }

                /* Vortex Admin exact selector for rainbow */
                #__rbCursor stop {
                    animation: rainbowShift 3s linear infinite;
                }

                @keyframes rainbowGlow {
                    0%   { filter: drop-shadow(0 0 4px red)    drop-shadow(0 0 10px red)    drop-shadow(0 0 20px red); }
                    20%  { filter: drop-shadow(0 0 4px orange) drop-shadow(0 0 10px orange) drop-shadow(0 0 20px orange); }
                    40%  { filter: drop-shadow(0 0 4px yellow) drop-shadow(0 0 10px yellow) drop-shadow(0 0 20px yellow); }
                    60%  { filter: drop-shadow(0 0 4px green)  drop-shadow(0 0 10px green)  drop-shadow(0 0 20px green); }
                    80%  { filter: drop-shadow(0 0 4px blue)   drop-shadow(0 0 10px blue)   drop-shadow(0 0 20px blue); }
                    100% { filter: drop-shadow(0 0 4px violet) drop-shadow(0 0 10px violet) drop-shadow(0 0 20px violet); }
                }

                #__rbCursor.rainbow-glow svg {
                    animation: rainbowGlow 3s linear infinite;
                }
            `;
            document.head.appendChild(style);
        }
        
        createCursorElement();
        attachMouseListeners();
        loadSavedMousePreferences();
        
        console.log('[Unified Mouse V2] Initialized – with dynamic key switching');
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initialize);
    } else {
        initialize();
    }

})();
</script>
