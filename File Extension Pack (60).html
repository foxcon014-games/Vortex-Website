<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Text Editor</title>
  <style>
    body {
      background: #1e1e1e;
      color: #eee;
      font-family: Consolas, monospace;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: black;
      border-bottom: none;
      border-left: none;
					border-top: none;
					border-right: none;
					padding: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .left-section {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .title {
      font-size: 23px;
      color: red;
      font-weight: bold;
					font-family:cursive;
    }

    .buttons {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    button {
      background: #444;
      color: red;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

            
    

    #renameInput {
      background: black;
      color: red;
      border: 1px solid maroon;
      border-radius: 4px;
      padding: 4px 6px;
      font-size: 13px;
      width: 160px;
      margin-right: 5px;
    }

    #renameInput:focus {
      outline: none;
    }

    main {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    .line-numbers {
      background: black;
      
					color: #858585;
      padding: 10px 8px 10px 4px;
      text-align: right;
      user-select: none;
      width: 50px;
      overflow: hidden;
      font-size: 14px;
      white-space: pre;
      line-height: 1.4em;
      border-right: none;
      position: relative;
    }

    .line-highlight {
      position: absolute;
      left: 0;
      width: 100%;
      background: rgba(128, 0, 0, 0.25);
      pointer-events: none;
      z-index: 0;
    }

    textarea {
      flex: 1;
      background: #1e1e1e;
     border-bottom: 0px solid maroon;
      border-left: 1px solid maroon;
					border-top: 1px solid maroon;
					border-right: 0px solid maroon;
					color: red;
      resize: none;
      padding: 10px;
      font-size: 14px;
      font-family: monospace;
      outline:none;
      line-height: 1.4em;
      overflow-y: scroll;
      overflow-x: hidden; /* Lock horizontal scroll */
   white-space: pre-wrap;
word-wrap: break-word;
overflow-x: hidden;
 }

    /* Optional: hide horizontal scrollbar if still appears */
    textarea::-webkit-scrollbar {
      height: 8px;
					
    }
  </style>
</head>
<body>
	
  <header>
    <div class="left-section">
      <div class="title">Text Editor</div>
    </div>

    <div class="buttons">
      <input type="text" id="renameInput" placeholder="File Name Here" />
      <button id="openBtn">Open File</button>
      <button id="saveBtn">Save</button>
      <button id="closeBtn">Close</button>
    </div>
    <style>
/* Text shadow for all text elements */
body, h1, h2, h3, h4, h5, h6, p, span, div, a, label, button, input, textarea, select, option {
    text-shadow: 0 0 4px currentColor, 0 0 10px currentColor, 0 0 20px currentColor, 0 0 40px currentColor;
}

/* Softer glow for placeholders */
::placeholder {
    text-shadow: 0 0 3px currentColor, 0 0 8px currentColor;
    opacity: 0.75;
}

/* Prevent glow on hidden elements */
[style*="display: none"], [style*="visibility: hidden"] {
    text-shadow: none !important;
}

/* Base transition for buttons */
#openBtn, #saveBtn, #closeBtn {
    transition: all 0.9s ease;
}

/* Hover effect for buttons */
#openBtn:hover, #saveBtn:hover, #closeBtn:hover {
    background: #222222;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.12) inset, 0 0 30px rgba(255,255,255,0.25);
    transition: all 0.7s ease;
}
</style>
  </header>

  <main>
    <div class="line-numbers" id="lineNumbers">
      <div class="line-highlight" id="lineHighlight"></div>
      1
    </div>
    <textarea id="editor" placeholder="Text/File Content Displays Here" spellcheck="false"></textarea>
  </main>

  <input type="file" id="fileInput" style="display:none;" />

  <script>
    const editor = document.getElementById("editor");
    const lineNumbers = document.getElementById("lineNumbers");
    const lineHighlight = document.getElementById("lineHighlight");
    const openBtn = document.getElementById("openBtn");
    const saveBtn = document.getElementById("saveBtn");
    const closeBtn = document.getElementById("closeBtn");
    const fileInput = document.getElementById("fileInput");
    const renameInput = document.getElementById("renameInput");

    let currentFileName = "untitled.txt";

    // Update line numbers
    function updateLineNumbers() {
  const lines = editor.value.split("\n");
  let numsHTML = "";
  
  lines.forEach((line, index) => {
    const testDiv = document.createElement("div");
    testDiv.style.visibility = "hidden";
    testDiv.style.position = "absolute";
    testDiv.style.width = editor.clientWidth + "px";
    testDiv.style.font = getComputedStyle(editor).font;
    testDiv.style.whiteSpace = "pre-wrap";
    testDiv.style.wordWrap = "break-word";
    testDiv.textContent = line || " ";
    document.body.appendChild(testDiv);
    
    const lineHeight = parseFloat(getComputedStyle(editor).lineHeight);
    const visualLines = Math.round(testDiv.scrollHeight / lineHeight);
    document.body.removeChild(testDiv);

    for (let i = 0; i < visualLines; i++) {
      if (i === 0) {
        numsHTML += `<span style="color:#858585">${index+1}</span><br>`;
      } else {
        numsHTML += `<span style="color:black">${index+1}</span><br>`;
      }
    }
  });

  lineNumbers.innerHTML = '<div class="line-highlight" id="lineHighlight"></div>' + numsHTML;
}


    // Update line highlight
    function updateHighlightPosition() {
      const lineHeight = parseFloat(getComputedStyle(editor).lineHeight);
      const selectionStart = editor.selectionStart;
      const textBeforeCaret = editor.value.substring(0, selectionStart);
      const currentLine = textBeforeCaret.split("\n").length;
      const top = (currentLine - 1) * lineHeight - editor.scrollTop + 10; // 10px padding
      lineHighlight.style.top = top + "px";
      lineHighlight.style.height = lineHeight + "px";
    }

    // Sync scroll with line numbers
    editor.addEventListener("scroll", () => {
      lineNumbers.scrollTop = editor.scrollTop;
      updateHighlightPosition();
    });

   let lineUpdateTimer;
editor.addEventListener('input', () => {
  clearTimeout(lineUpdateTimer);
  lineUpdateTimer = setTimeout(() => {
    updateLineNumbers();
    updateHighlightPosition();
  }, 0);
});
    editor.addEventListener("click", updateHighlightPosition);
    editor.addEventListener("keyup", updateHighlightPosition);

    // File handling
    openBtn.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        editor.value = e.target.result;
        currentFileName = file.name;
        renameInput.value = currentFileName;
        updateLineNumbers();
        updateHighlightPosition();
      };
      reader.readAsText(file);
      fileInput.value = "";
    });

    saveBtn.addEventListener("click", () => {
      try {
        let newName = renameInput.value.trim() || currentFileName;
        currentFileName = newName;
        const blob = new Blob([editor.value], { type: "text/plain" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = currentFileName;
        a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 500);
      } catch (err) {
        console.warn("Save failed:", err);
      }
    });

    closeBtn.addEventListener("click", () => {
      editor.value = "";
      renameInput.value = "";
      lineNumbers.textContent = "1";
      currentFileName = "untitled.txt";
    });

    // Initialize
    updateLineNumbers();
    updateHighlightPosition();
  </script>

<script>
  // Disable spellcheck on file name input
  document.getElementById("renameInput").setAttribute("spellcheck", "false");
</script>




<script>


(function() {
    'use strict';

    // ───────────────────────────────────────────────────────────────────
    // 1. PAGE DETECTION (only for default color fallback)
    // ───────────────────────────────────────────────────────────────────
    const pageTitle = document.title.toLowerCase();
    const isAdminFallback = pageTitle.includes('admin');
    const defaultMouseColor = isAdminFallback ? 'rainbow' : 'red';
    
    console.log(`[Unified Mouse V2] Detected: ${isAdminFallback ? 'ADMIN' : 'REGULAR'} mode (fallback)`);

    // ───────────────────────────────────────────────────────────────────
    // 2. GLOBAL VARIABLES
    // ───────────────────────────────────────────────────────────────────
    let mouseActive = false;
    let rainbow = false;
    let currentColor = defaultMouseColor;
    let cursorElement = null;
    let isMouseInsideBounds = false;  // hidden until mouse enters
    let storagePrefix = 'vortex';     // default to regular

    // ───────────────────────────────────────────────────────────────────
    // 3. DETERMINE STORAGE PREFIX based on 'vortexMode'
    // ───────────────────────────────────────────────────────────────────
    function getStoragePrefix() {
        const mode = localStorage.getItem('vortexMode');
        return (mode === 'admin') ? 'vortexadmin' : 'vortex';
    }

    // ───────────────────────────────────────────────────────────────────
    // 4. CREATE CURSOR ELEMENT (with Vortex Admin rainbow-ready gradient)
    // ───────────────────────────────────────────────────────────────────
    function createCursorElement() {
        cursorElement = document.getElementById('__rbCursor');
        
        if (!cursorElement) {
            cursorElement = document.createElement('div');
            cursorElement.id = '__rbCursor';
            cursorElement.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 32px;
                height: 32px;
                pointer-events: none;
                z-index: 2147483647;
                transform: translate(-4px, -4px);
                display: none;
            `;
            
            cursorElement.innerHTML = `
                <svg viewBox="0 0 32 32" width="100%" height="100%">
                    <defs>
                        <linearGradient id="rbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%"   stop-color="#ff0000" />
                            <stop offset="20%"  stop-color="#ff0000" />
                            <stop offset="40%"  stop-color="#ff0000" />
                            <stop offset="60%"  stop-color="#ff0000" />
                            <stop offset="80%"  stop-color="#ff0000" />
                            <stop offset="100%" stop-color="#ff0000" />
                        </linearGradient>
                    </defs>
                    <polygon points="0,0 0,28 8,20 14,30 18,28 12,18 20,18" fill="url(#rbGradient)" />
                </svg>
            `;
            
            document.body.appendChild(cursorElement);
        }
        
        return cursorElement;
    }

    // ───────────────────────────────────────────────────────────────────
    // 5. APPLY COLOR (Vortex Admin style rainbow via stop animation)
    // ───────────────────────────────────────────────────────────────────
    function applyMouseColor(color) {
        if (!cursorElement) return;
        
        const polygon = cursorElement.querySelector('polygon');
        const svg     = cursorElement.querySelector('svg');
        const stops   = cursorElement.querySelectorAll('stop');
        
        if (!polygon || !stops.length) return;

        if (color === 'rainbow') {
            rainbow = true;
            polygon.setAttribute('fill', 'url(#rbGradient)');
            stops.forEach(stop => {
                stop.style.animation = 'rainbowShift 3s linear infinite';
            });
            cursorElement.classList.add('rainbow-glow');
            if (svg) svg.style.filter = '';
        } else {
            rainbow = false;
            polygon.setAttribute('fill', color);
            stops.forEach(stop => {
                stop.style.animation = 'none';
                stop.style.stopColor = color;  // fallback solid
            });
            cursorElement.classList.remove('rainbow-glow');
            if (svg) svg.style.filter = `drop-shadow(0 0 4px ${color}) drop-shadow(0 0 10px ${color}) drop-shadow(0 0 20px ${color})`;
        }
        
        currentColor = color;
    }

    // ───────────────────────────────────────────────────────────────────
    // 6. ACTIVATE / DEACTIVATE
    // ───────────────────────────────────────────────────────────────────
    function activateMouse() {
        if (!cursorElement) createCursorElement();
        
        if (isMouseInsideBounds) {
            cursorElement.style.display = 'block';
        }
        mouseActive = true;
        
        const savedColor = localStorage.getItem(`${storagePrefix}MouseColor`) || defaultMouseColor;
        applyMouseColor(savedColor);
        
        localStorage.setItem(`${storagePrefix}MouseEnabled`, 'true');
    }

    function deactivateMouse() {
        if (cursorElement) {
            cursorElement.style.display = 'none';
        }
        mouseActive = false;
        localStorage.setItem(`${storagePrefix}MouseEnabled`, 'false');
    }

    // ───────────────────────────────────────────────────────────────────
    // 7. REFRESH FROM LATEST LOCALSTORAGE
    // ───────────────────────────────────────────────────────────────────
    function refreshFromLocalStorage() {
        storagePrefix = getStoragePrefix();  // Re-check mode each time
        
        const enabledStr = localStorage.getItem(`${storagePrefix}MouseEnabled`);
        const color = localStorage.getItem(`${storagePrefix}MouseColor`) || defaultMouseColor;

        const shouldBeActive = enabledStr === 'true';

        if (shouldBeActive !== mouseActive) {
            if (shouldBeActive) {
                activateMouse();
            } else {
                deactivateMouse();
            }
        } else if (shouldBeActive) {
            applyMouseColor(color);
        }

        if (cursorElement) {
            cursorElement.style.display = (mouseActive && isMouseInsideBounds) ? 'block' : 'none';
        }
        
        console.log(`[Unified Mouse V2] Using prefix: ${storagePrefix} (mode: ${localStorage.getItem('vortexMode') || 'regular'})`);
    }

    // ───────────────────────────────────────────────────────────────────
    // 8. MOUSE TRACKING + BOUNDARY DETECTION
    // ───────────────────────────────────────────────────────────────────
    function updateCursorPosition(e) {
        if (!mouseActive || !cursorElement) return;
        
        const x = e.clientX;
        const y = e.clientY;
        const w = window.innerWidth;
        const h = window.innerHeight;
        
        const buffer = 5;
        const inside = (
            x >= -buffer && x <= w + buffer &&
            y >= -buffer && y <= h + buffer
        );
        
        if (inside) {
            if (!isMouseInsideBounds) {
                isMouseInsideBounds = true;
                refreshFromLocalStorage();
                if (mouseActive) cursorElement.style.display = 'block';
            }
            cursorElement.style.left = x + 'px';
            cursorElement.style.top = y + 'px';
        } else {
            if (isMouseInsideBounds) {
                isMouseInsideBounds = false;
                refreshFromLocalStorage();
                cursorElement.style.display = 'none';
            }
        }
    }

    function handleMouseLeave() {
        if (cursorElement) {
            isMouseInsideBounds = false;
            refreshFromLocalStorage();
            cursorElement.style.display = 'none';
        }
    }

    function handleMouseEnter() {
        if (cursorElement) {
            isMouseInsideBounds = true;
            refreshFromLocalStorage();
            if (mouseActive) cursorElement.style.display = 'block';
        }
    }

    // ───────────────────────────────────────────────────────────────────
    // 9. EVENT LISTENERS
    // ───────────────────────────────────────────────────────────────────
    function attachMouseListeners() {
        document.addEventListener('mousemove', updateCursorPosition);
        document.addEventListener('mouseleave', handleMouseLeave);
        document.addEventListener('mouseenter', handleMouseEnter);
        
        window.addEventListener('mouseout', e => {
            if (!e.relatedTarget && !e.toElement) handleMouseLeave();
        });
    }

    // ───────────────────────────────────────────────────────────────────
    // 10. LIVE SYNC FROM OTHER TABS
    // ───────────────────────────────────────────────────────────────────
    window.addEventListener('storage', e => {
        if (e.key.startsWith('vortex') && (e.key.includes('MouseEnabled') || e.key.includes('MouseColor') || e.key === 'vortexMode')) {
            refreshFromLocalStorage();
        }
    });

    // ───────────────────────────────────────────────────────────────────
    // 11. INITIAL LOAD
    // ───────────────────────────────────────────────────────────────────
    function loadSavedMousePreferences() {
        refreshFromLocalStorage();
    }

    // ───────────────────────────────────────────────────────────────────
    // 12. INITIALIZE – add EXACT Vortex Admin rainbow keyframes
    // ───────────────────────────────────────────────────────────────────
    function initialize() {
        if (!document.getElementById('unifiedMouseStyles')) {
            const style = document.createElement('style');
            style.id = 'unifiedMouseStyles';
            style.textContent = `
                @keyframes rainbowShift {
                    0%   { stop-color: red;    }
                    20%  { stop-color: orange; }
                    40%  { stop-color: yellow; }
                    60%  { stop-color: green;  }
                    80%  { stop-color: blue;   }
                    100% { stop-color: violet; }
                }

                * {
                    cursor: none !important;
                }

                /* Vortex Admin exact selector for rainbow */
                #__rbCursor stop {
                    animation: rainbowShift 3s linear infinite;
                }

                @keyframes rainbowGlow {
                    0%   { filter: drop-shadow(0 0 4px red)    drop-shadow(0 0 10px red)    drop-shadow(0 0 20px red); }
                    20%  { filter: drop-shadow(0 0 4px orange) drop-shadow(0 0 10px orange) drop-shadow(0 0 20px orange); }
                    40%  { filter: drop-shadow(0 0 4px yellow) drop-shadow(0 0 10px yellow) drop-shadow(0 0 20px yellow); }
                    60%  { filter: drop-shadow(0 0 4px green)  drop-shadow(0 0 10px green)  drop-shadow(0 0 20px green); }
                    80%  { filter: drop-shadow(0 0 4px blue)   drop-shadow(0 0 10px blue)   drop-shadow(0 0 20px blue); }
                    100% { filter: drop-shadow(0 0 4px violet) drop-shadow(0 0 10px violet) drop-shadow(0 0 20px violet); }
                }

                #__rbCursor.rainbow-glow svg {
                    animation: rainbowGlow 3s linear infinite;
                }
            `;
            document.head.appendChild(style);
        }
        
        createCursorElement();
        attachMouseListeners();
        loadSavedMousePreferences();
        
        console.log('[Unified Mouse V2] Initialized – with dynamic key switching');
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initialize);
    } else {
        initialize();
    }

})();
</script>
</body>
</html>
