<body>

    <div id="menu-screen">
        <h1>TIC TAC TOE</h1>
        <button class="menu-btn" onclick="chooseMode(false)">Player VS Player</button>
        <button class="menu-btn" onclick="chooseMode(true)">Player VS CPU</button>
    </div>

    <div id="symbol-screen" style="display: none;">
        <h1>Select To</h1>
        <button class="menu-btn" onclick="startWithSymbol('x')">Play As X</button>
        <button class="menu-btn" onclick="startWithSymbol('o')">Play As O</button>
    </div>

    <button id="exit-btn" onclick="goToMenu()">Exit</button>
    <button id="difficulty-btn" onclick="cycleDifficulty()">Normal</button>

    <h1 id="game-title" style="display:none; color:red;">TIC TAC TOE</h1>
    <div class="turns x" style="display:none;">X's turn</div>

    <div class="board x" style="display:none;">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <div class="finish">
      <div class="message">
        <span class="text"></span>
        <button id="restart">Play Again</button>
        <button id="back-to-menu">Exit</button>
      </div>
    </div>
<style>

    <script>
        var currTurn = "x";
        var playerSymbol = "x";
        var isVsCPU = false;
        var gameActive = false;
        var difficulty = "Normal"; // Easy, Normal, Hard

        const winCombs = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        const board = document.querySelector(".board");
        const cells = document.querySelectorAll(".cell");
        const turns = document.querySelector(".turns");
        const finish = document.querySelector(".finish");
        const text = document.querySelector(".text");
        const menuScreen = document.getElementById("menu-screen");
        const symbolScreen = document.getElementById("symbol-screen");
        const exitBtn = document.getElementById("exit-btn");
        const difficultyBtn = document.getElementById("difficulty-btn");

        function cycleDifficulty() {
            if (difficulty === "Normal") {
                difficulty = "Hard";
            } else if (difficulty === "Hard") {
                difficulty = "Easy";
            } else {
                difficulty = "Normal";
            }
            difficultyBtn.innerText = difficulty;
        }

        function chooseMode(vsCPU) {
            isVsCPU = vsCPU;
            menuScreen.style.display = "none";

            if (vsCPU) {
                symbolScreen.style.display = "flex";
            } else {
                startGame();
            }
        }

        function startWithSymbol(symbol) {
            playerSymbol = symbol;
            symbolScreen.style.display = "none";
            startGame();
        }

        function startGame() {
            document.getElementById("game-title").style.display = "block";
            board.style.display = "grid";
            turns.style.display = "block";
            exitBtn.style.display = "block";
            
            if (isVsCPU) {
                difficultyBtn.style.display = "block";
            } else {
                difficultyBtn.style.display = "none";
            }

            resetGame();

            if (isVsCPU && playerSymbol === "o") {
                gameActive = false;
                setTimeout(cpuMove, 500);
            }
        }

        function goToMenu() {
            menuScreen.style.display = "flex";
            symbolScreen.style.display = "none";
            board.style.display = "none";
            turns.style.display = "none";
            finish.style.display = "none";
            document.getElementById("game-title").style.display = "none";
            exitBtn.style.display = "none";
            difficultyBtn.style.display = "none";
            resetGame();
        }

        function resetGame() {
            currTurn = "x";
            gameActive = true;
            turns.innerText = "X's turn";
            turns.className = "turns x";
            board.className = "board x" + (isVsCPU ? " vs-cpu" + (playerSymbol === "x" ? " player-x" : " player-o") : "");
            finish.style.display = "none";
            cells.forEach((cell) => {
                cell.innerHTML = "X";
                cell.className = "cell";
                cell.addEventListener("click", handleClick);
            });
            updateHoverText();
        }

        function handleClick(e) {
            const cell = e.target;

            if (isVsCPU) {
                if (!gameActive || currTurn !== playerSymbol) {
                    return;
                }
            } else {
                if (!gameActive) {
                    return;
                }
            }

            if (cell.classList.contains("x") || cell.classList.contains("o")) {
                return;
            }

            markTheCell(cell, currTurn);

            if (checkWin(currTurn)) {
                gameOver(false);
            } else if (isDraw()) {
                gameOver(true);
            } else {
                changeTurn();

                if (isVsCPU && currTurn !== playerSymbol) {
                    gameActive = false;
                    setTimeout(cpuMove, 500);
                }
            }
        }

        function cpuMove() {
            const boardState = getBoardState();
            let chosenIndex;

            if (difficulty === "Easy") {
                // Easy: Random moves with occasional blocking
                const blockMove = findWinningMove(boardState, playerSymbol);
                if (blockMove !== -1 && Math.random() < 0.5) {
                    // Only block 50% of the time
                    chosenIndex = blockMove;
                } else {
                    // Random move
                    const available = boardState.map((v, i) => v === null ? i : null).filter(v => v !== null);
                    chosenIndex = available[Math.floor(Math.random() * available.length)];
                }
            } else if (difficulty === "Normal") {
                // Normal: Some mistakes but still strategic (70% optimal play)
                const errorChance = Math.random();
                
                // 20% chance - completely random move (major blunder)
                if (errorChance < 0.20) {
                    const available = boardState.map((v, i) => v === null ? i : null).filter(v => v !== null);
                    chosenIndex = available[Math.floor(Math.random() * available.length)];
                } 
                // 5% chance - focus too much on winning, miss blocking (tunnel vision)
                else if (errorChance < 0.25) {
                    const winMove = findWinningMove(boardState, getCpuSymbol());
                    if (winMove !== -1) {
                        chosenIndex = winMove;
                    } else {
                        // Skip blocking check, go straight to strategy (mistake!)
                        chosenIndex = getSimpleStrategicMove(boardState);
                    }
                }
                // 5% chance - focus too much on blocking, miss winning opportunity
                else if (errorChance < 0.30) {
                    const blockMove = findWinningMove(boardState, playerSymbol);
                    if (blockMove !== -1) {
                        chosenIndex = blockMove;
                    } else {
                        // Didn't check for win first (mistake!)
                        chosenIndex = getSimpleStrategicMove(boardState);
                    }
                }
                // 70% of the time - play correctly (optimal strategy)
                else {
                    const winMove = findWinningMove(boardState, getCpuSymbol());
                    if (winMove !== -1) {
                        chosenIndex = winMove;
                    } else {
                        const blockMove = findWinningMove(boardState, playerSymbol);
                        if (blockMove !== -1) {
                            chosenIndex = blockMove;
                        } else {
                            // Simple strategic positioning
                            chosenIndex = getSimpleStrategicMove(boardState);
                        }
                    }
                }
            } else {
                // Hard: Full strategic AI (original behavior)
                const winMove = findWinningMove(boardState, getCpuSymbol());
                if (winMove !== -1) {
                    chosenIndex = winMove;
                } else {
                    const blockMove = findWinningMove(boardState, playerSymbol);
                    if (blockMove !== -1) {
                        chosenIndex = blockMove;
                    } else {
                        const forkMove = findForkMove(boardState, getCpuSymbol());
                        if (forkMove !== -1) {
                            chosenIndex = forkMove;
                        } else {
                            const blockFork = findForkMove(boardState, playerSymbol);
                            if (blockFork !== -1) {
                                chosenIndex = blockFork;
                            } else {
                                chosenIndex = getStrategicMove(boardState);
                            }
                        }
                    }
                }
            }

            const cell = cells[chosenIndex];
            markTheCell(cell, currTurn);

            if (checkWin(currTurn)) {
                gameOver(false);
            } else if (isDraw()) {
                gameOver(true);
            } else {
                gameActive = true;
                changeTurn();
            }
        }

        // Simple strategic move for Normal difficulty
        function getSimpleStrategicMove(board) {
            const center = 4;
            const corners = [0, 2, 6, 8];
            const edges = [1, 3, 5, 7];

            // Priority 1: Take center if available (strong position)
            if (board[center] === null) {
                return center;
            }

            // Priority 2: Look for corner opportunities
            const availableCorners = corners.filter(i => board[i] === null);
            if (availableCorners.length > 0) {
                // Try to take opposite corner if player took a corner
                const cpuSymbol = getCpuSymbol();
                if (board[0] === playerSymbol && board[8] === null) return 8;
                if (board[2] === playerSymbol && board[6] === null) return 6;
                if (board[6] === playerSymbol && board[2] === null) return 2;
                if (board[8] === playerSymbol && board[0] === null) return 0;
                
                // Otherwise take any available corner
                return availableCorners[Math.floor(Math.random() * availableCorners.length)];
            }

            // Priority 3: Check if taking an edge creates a two-way threat
            const availableEdges = edges.filter(i => board[i] === null);
            if (availableEdges.length > 0) {
                // Try to find an edge that helps create future threats
                for (let edge of availableEdges) {
                    board[edge] = getCpuSymbol();
                    let threats = 0;
                    // Count how many winning opportunities this creates
                    for (let i = 0; i < 9; i++) {
                        if (board[i] === null) {
                            board[i] = getCpuSymbol();
                            if (checkWinMini(board, getCpuSymbol())) threats++;
                            board[i] = null;
                        }
                    }
                    board[edge] = null;
                    if (threats >= 2) return edge; // Creates fork opportunity
                }
                // Otherwise random edge
                return availableEdges[Math.floor(Math.random() * availableEdges.length)];
            }

            // Fallback: any available spot
            const available = board.map((v, i) => v === null ? i : null).filter(v => v !== null);
            return available[Math.floor(Math.random() * available.length)];
        }

        // Find a move that wins the game immediately
        function findWinningMove(board, player) {
            for (let i = 0; i < 9; i++) {
                if (board[i] === null) {
                    board[i] = player;
                    if (checkWinMini(board, player)) {
                        board[i] = null;
                        return i;
                    }
                    board[i] = null;
                }
            }
            return -1;
        }

        // Find a move that creates a fork (two ways to win)
        function findForkMove(board, player) {
            const forkMoves = [];
            for (let i = 0; i < 9; i++) {
                if (board[i] === null) {
                    board[i] = player;
                    let winningMoves = 0;
                    for (let j = 0; j < 9; j++) {
                        if (board[j] === null) {
                            board[j] = player;
                            if (checkWinMini(board, player)) {
                                winningMoves++;
                            }
                            board[j] = null;
                        }
                    }
                    if (winningMoves >= 2) {
                        forkMoves.push(i);
                    }
                    board[i] = null;
                }
            }
            
            if (forkMoves.length > 0) {
                // Randomly pick one of the fork moves for unpredictability
                return forkMoves[Math.floor(Math.random() * forkMoves.length)];
            }
            return -1;
        }

        // Strategic move with unpredictability
        function getStrategicMove(board) {
            const cpuSymbol = getCpuSymbol();
            const center = 4;
            const corners = [0, 2, 6, 8];
            const edges = [1, 3, 5, 7];

            // Priority 1: Take center if available (60% of the time for variation)
            if (board[center] === null && Math.random() < 0.6) {
                return center;
            }

            // Priority 2: Take corners with strategic preference
            const availableCorners = corners.filter(i => board[i] === null);
            if (availableCorners.length > 0) {
                // Check for opposite corner play
                const oppositeCornerMoves = [];
                if (board[0] === playerSymbol && board[8] === null) oppositeCornerMoves.push(8);
                if (board[2] === playerSymbol && board[6] === null) oppositeCornerMoves.push(6);
                if (board[6] === playerSymbol && board[2] === null) oppositeCornerMoves.push(2);
                if (board[8] === playerSymbol && board[0] === null) oppositeCornerMoves.push(0);
                
                if (oppositeCornerMoves.length > 0 && Math.random() < 0.7) {
                    return oppositeCornerMoves[Math.floor(Math.random() * oppositeCornerMoves.length)];
                }

                // Take random corner for unpredictability
                return availableCorners[Math.floor(Math.random() * availableCorners.length)];
            }

            // Priority 3: Take center if still available
            if (board[center] === null) {
                return center;
            }

            // Priority 4: Take edges (with randomness)
            const availableEdges = edges.filter(i => board[i] === null);
            if (availableEdges.length > 0) {
                return availableEdges[Math.floor(Math.random() * availableEdges.length)];
            }

            // Fallback: any available spot
            const available = board.map((v, i) => v === null ? i : null).filter(v => v !== null);
            return available[Math.floor(Math.random() * available.length)];
        }

        function markTheCell(cell, player) {
            cell.innerHTML = player.toUpperCase();
            cell.classList.add(player);
            cell.removeEventListener("click", handleClick);
        }

        function changeTurn() {
            turns.classList.remove(currTurn);
            currTurn = (currTurn === "x") ? "o" : "x";
            turns.classList.add(currTurn);
            turns.innerText = currTurn.toUpperCase() + "'s turn";
            board.className = "board " + currTurn + (isVsCPU ? " vs-cpu" + (playerSymbol === "x" ? " player-x" : " player-o") : "");
            updateHoverText();
        }

        function updateHoverText() {
            const showSymbol = isVsCPU ? playerSymbol : currTurn;

            cells.forEach(cell => {
                if (!cell.classList.contains("x") && !cell.classList.contains("o")) {
                    cell.innerHTML = showSymbol.toUpperCase();
                }
            });
        }

        function checkWin(player) {
            return winCombs.some(comb => {
                return comb.every(index => cells[index].classList.contains(player));
            });
        }

        function isDraw() {
            return [...cells].every(cell => cell.classList.contains("x") || cell.classList.contains("o"));
        }

        function gameOver(draw) {
            gameActive = false;
            if (draw) {
                text.innerText = "Draw!";
            } else {
                const winner = currTurn;
                if (isVsCPU) {
                    text.innerText = (winner === playerSymbol) ? "You Win!" : "CPU Wins!";
                } else {
                    text.innerText = winner.toUpperCase() + " Wins!";
                }
            }
            finish.style.display = "flex";
        }

        function getBoardState() {
            return [...cells].map(cell => {
                if (cell.classList.contains("x")) return "x";
                if (cell.classList.contains("o")) return "o";
                return null;
            });
        }

        function checkWinMini(board, player) {
            return winCombs.some(comb => comb.every(idx => board[idx] === player));
        }

        function getCpuSymbol() {
            return playerSymbol === "x" ? "o" : "x";
        }

        document.getElementById("restart").addEventListener("click", () => {
            if (isVsCPU) {
                // Show symbol choice again on Play Again with CPU
                finish.style.display = "none";
                board.style.display = "none";
                turns.style.display = "none";
                document.getElementById("game-title").style.display = "none";
                exitBtn.style.display = "none";
                difficultyBtn.style.display = "none";
                symbolScreen.style.display = "flex";
            } else {
                chooseMode(false);
            }
        });
        document.getElementById("back-to-menu").addEventListener("click", goToMenu);
    </script>


<script>

(function() {
    'use strict';

    // ───────────────────────────────────────────────────────────────────
    // 1. PAGE DETECTION (only for default color fallback)
    // ───────────────────────────────────────────────────────────────────
    const pageTitle = document.title.toLowerCase();
    const isAdminFallback = pageTitle.includes('admin');
    const defaultMouseColor = isAdminFallback ? 'rainbow' : 'red';
    
    console.log(`[Unified Mouse V2] Detected: ${isAdminFallback ? 'ADMIN' : 'REGULAR'} mode (fallback)`);

    // ───────────────────────────────────────────────────────────────────
    // 2. GLOBAL VARIABLES
    // ───────────────────────────────────────────────────────────────────
    let mouseActive = false;
    let rainbow = false;
    let currentColor = defaultMouseColor;
    let cursorElement = null;
    let isMouseInsideBounds = false;  // hidden until mouse enters
    let storagePrefix = 'vortex';     // default to regular

    // ───────────────────────────────────────────────────────────────────
    // 3. DETERMINE STORAGE PREFIX based on 'vortexMode'
    // ───────────────────────────────────────────────────────────────────
    function getStoragePrefix() {
        const mode = localStorage.getItem('vortexMode');
        return (mode === 'admin') ? 'vortexadmin' : 'vortex';
    }

    // ───────────────────────────────────────────────────────────────────
    // 4. CREATE CURSOR ELEMENT (with Vortex Admin rainbow-ready gradient)
    // ───────────────────────────────────────────────────────────────────
    function createCursorElement() {
        cursorElement = document.getElementById('__rbCursor');
        
        if (!cursorElement) {
            cursorElement = document.createElement('div');
            cursorElement.id = '__rbCursor';
            cursorElement.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 32px;
                height: 32px;
                pointer-events: none;
                z-index: 2147483647;
                transform: translate(-4px, -4px);
                display: none;
            `;
            
            cursorElement.innerHTML = `
                <svg viewBox="0 0 32 32" width="100%" height="100%">
                    <defs>
                        <linearGradient id="rbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%"   stop-color="#ff0000" />
                            <stop offset="20%"  stop-color="#ff0000" />
                            <stop offset="40%"  stop-color="#ff0000" />
                            <stop offset="60%"  stop-color="#ff0000" />
                            <stop offset="80%"  stop-color="#ff0000" />
                            <stop offset="100%" stop-color="#ff0000" />
                        </linearGradient>
                    </defs>
                    <polygon points="0,0 0,28 8,20 14,30 18,28 12,18 20,18" fill="url(#rbGradient)" />
                </svg>
            `;
            
            document.body.appendChild(cursorElement);
        }
        
        return cursorElement;
    }

    // ───────────────────────────────────────────────────────────────────
    // 5. APPLY COLOR (Vortex Admin style rainbow via stop animation)
    // ───────────────────────────────────────────────────────────────────
    function applyMouseColor(color) {
        if (!cursorElement) return;
        
        const polygon = cursorElement.querySelector('polygon');
        const svg     = cursorElement.querySelector('svg');
        const stops   = cursorElement.querySelectorAll('stop');
        
        if (!polygon || !stops.length) return;

        if (color === 'rainbow') {
            rainbow = true;
            polygon.setAttribute('fill', 'url(#rbGradient)');
            stops.forEach(stop => {
                stop.style.animation = 'rainbowShift 3s linear infinite';
            });
            cursorElement.classList.add('rainbow-glow');
            if (svg) svg.style.filter = '';
        } else {
            rainbow = false;
            polygon.setAttribute('fill', color);
            stops.forEach(stop => {
                stop.style.animation = 'none';
                stop.style.stopColor = color;  // fallback solid
            });
            cursorElement.classList.remove('rainbow-glow');
            if (svg) svg.style.filter = `drop-shadow(0 0 4px ${color}) drop-shadow(0 0 10px ${color}) drop-shadow(0 0 20px ${color})`;
        }
        
        currentColor = color;
    }

    // ───────────────────────────────────────────────────────────────────
    // 6. ACTIVATE / DEACTIVATE
    // ───────────────────────────────────────────────────────────────────
    function activateMouse() {
        if (!cursorElement) createCursorElement();
        
        if (isMouseInsideBounds) {
            cursorElement.style.display = 'block';
        }
        mouseActive = true;
        
        const savedColor = localStorage.getItem(`${storagePrefix}MouseColor`) || defaultMouseColor;
        applyMouseColor(savedColor);
        
        localStorage.setItem(`${storagePrefix}MouseEnabled`, 'true');
    }

    function deactivateMouse() {
        if (cursorElement) {
            cursorElement.style.display = 'none';
        }
        mouseActive = false;
        localStorage.setItem(`${storagePrefix}MouseEnabled`, 'false');
    }

    // ───────────────────────────────────────────────────────────────────
    // 7. REFRESH FROM LATEST LOCALSTORAGE
    // ───────────────────────────────────────────────────────────────────
    function refreshFromLocalStorage() {
        storagePrefix = getStoragePrefix();  // Re-check mode each time
        
        const enabledStr = localStorage.getItem(`${storagePrefix}MouseEnabled`);
        const color = localStorage.getItem(`${storagePrefix}MouseColor`) || defaultMouseColor;

        const shouldBeActive = enabledStr === 'true';

        if (shouldBeActive !== mouseActive) {
            if (shouldBeActive) {
                activateMouse();
            } else {
                deactivateMouse();
            }
        } else if (shouldBeActive) {
            applyMouseColor(color);
        }

        if (cursorElement) {
            cursorElement.style.display = (mouseActive && isMouseInsideBounds) ? 'block' : 'none';
        }
        
        console.log(`[Unified Mouse V2] Using prefix: ${storagePrefix} (mode: ${localStorage.getItem('vortexMode') || 'regular'})`);
    }

    // ───────────────────────────────────────────────────────────────────
    // 8. MOUSE TRACKING + BOUNDARY DETECTION
    // ───────────────────────────────────────────────────────────────────
    function updateCursorPosition(e) {
        if (!mouseActive || !cursorElement) return;
        
        const x = e.clientX;
        const y = e.clientY;
        const w = window.innerWidth;
        const h = window.innerHeight;
        
        const buffer = 5;
        const inside = (
            x >= -buffer && x <= w + buffer &&
            y >= -buffer && y <= h + buffer
        );
        
        if (inside) {
            if (!isMouseInsideBounds) {
                isMouseInsideBounds = true;
                refreshFromLocalStorage();
                if (mouseActive) cursorElement.style.display = 'block';
            }
            cursorElement.style.left = x + 'px';
            cursorElement.style.top = y + 'px';
        } else {
            if (isMouseInsideBounds) {
                isMouseInsideBounds = false;
                refreshFromLocalStorage();
                cursorElement.style.display = 'none';
            }
        }
    }

    function handleMouseLeave() {
        if (cursorElement) {
            isMouseInsideBounds = false;
            refreshFromLocalStorage();
            cursorElement.style.display = 'none';
        }
    }

    function handleMouseEnter() {
        if (cursorElement) {
            isMouseInsideBounds = true;
            refreshFromLocalStorage();
            if (mouseActive) cursorElement.style.display = 'block';
        }
    }

    // ───────────────────────────────────────────────────────────────────
    // 9. EVENT LISTENERS
    // ───────────────────────────────────────────────────────────────────
    function attachMouseListeners() {
        document.addEventListener('mousemove', updateCursorPosition);
        document.addEventListener('mouseleave', handleMouseLeave);
        document.addEventListener('mouseenter', handleMouseEnter);
        
        window.addEventListener('mouseout', e => {
            if (!e.relatedTarget && !e.toElement) handleMouseLeave();
        });
    }

    // ───────────────────────────────────────────────────────────────────
    // 10. LIVE SYNC FROM OTHER TABS
    // ───────────────────────────────────────────────────────────────────
    window.addEventListener('storage', e => {
        if (e.key.startsWith('vortex') && (e.key.includes('MouseEnabled') || e.key.includes('MouseColor') || e.key === 'vortexMode')) {
            refreshFromLocalStorage();
        }
    });

    // ───────────────────────────────────────────────────────────────────
    // 11. INITIAL LOAD
    // ───────────────────────────────────────────────────────────────────
    function loadSavedMousePreferences() {
        refreshFromLocalStorage();
    }

    // ───────────────────────────────────────────────────────────────────
    // 12. INITIALIZE – add EXACT Vortex Admin rainbow keyframes
    // ───────────────────────────────────────────────────────────────────
    function initialize() {
        if (!document.getElementById('unifiedMouseStyles')) {
            const style = document.createElement('style');
            style.id = 'unifiedMouseStyles';
            style.textContent = `
                @keyframes rainbowShift {
                    0%   { stop-color: red;    }
                    20%  { stop-color: orange; }
                    40%  { stop-color: yellow; }
                    60%  { stop-color: green;  }
                    80%  { stop-color: blue;   }
                    100% { stop-color: violet; }
                }

                * {
                    cursor: none !important;
                }

                /* Vortex Admin exact selector for rainbow */
                #__rbCursor stop {
                    animation: rainbowShift 3s linear infinite;
                }

                @keyframes rainbowGlow {
                    0%   { filter: drop-shadow(0 0 4px red)    drop-shadow(0 0 10px red)    drop-shadow(0 0 20px red); }
                    20%  { filter: drop-shadow(0 0 4px orange) drop-shadow(0 0 10px orange) drop-shadow(0 0 20px orange); }
                    40%  { filter: drop-shadow(0 0 4px yellow) drop-shadow(0 0 10px yellow) drop-shadow(0 0 20px yellow); }
                    60%  { filter: drop-shadow(0 0 4px green)  drop-shadow(0 0 10px green)  drop-shadow(0 0 20px green); }
                    80%  { filter: drop-shadow(0 0 4px blue)   drop-shadow(0 0 10px blue)   drop-shadow(0 0 20px blue); }
                    100% { filter: drop-shadow(0 0 4px violet) drop-shadow(0 0 10px violet) drop-shadow(0 0 20px violet); }
                }

                #__rbCursor.rainbow-glow svg {
                    animation: rainbowGlow 3s linear infinite;
                }
            `;
            document.head.appendChild(style);
        }
        
        createCursorElement();
        attachMouseListeners();
        loadSavedMousePreferences();
        
        console.log('[Unified Mouse V2] Initialized – with dynamic key switching');
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initialize);
    } else {
        initialize();
    }

})();
</script>
</body>
